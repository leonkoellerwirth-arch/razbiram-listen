name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Net-free by design: the whole suite runs without downloading any Whisper or
# language model. Real-model checks are marked `slow` and excluded here
# (ECOSYSTEM §5).
jobs:
  python:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (with the razbiram-nlp hub dependency)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest (net-free)
        run: pytest

  viewer:
    name: viewer build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
