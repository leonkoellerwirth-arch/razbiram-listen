name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Net-free by design: the whole suite runs without downloading any Whisper or
# language model. Real-model checks are marked `slow` and excluded here
# (ECOSYSTEM §5).
jobs:
  python:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (with the razbiram-nlp hub dependency)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest (net-free)
        run: pytest
